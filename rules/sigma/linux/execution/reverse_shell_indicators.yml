title: Linux Reverse Shell Execution Indicators
id: f1g6h7i8-3j5e-8i6f-2g8h-6j7i9k0l1m2n
status: stable
description: |
  Detects command-line patterns associated with interactive reverse shell
  establishment on Linux systems covering bash, Python, Perl, and netcat
  variants observed in post-exploitation scenarios.
references:
  - https://attack.mitre.org/techniques/T1059/004/
author: Aditya Vatsa
date: 2024-06-01
modified: 2024-11-01
tags:
  - attack.execution
  - attack.t1059.004
logsource:
  product: linux
  service: syslog
detection:
  selection:
    CommandLine|contains:
      - 'bash -i >& /dev/tcp'
      - 'python -c import socket'
      - 'perl -e use Socket'
      - 'nc -e /bin/bash'
      - 'nc -e /bin/sh'
  condition: selection
falsepositives:
  - Authorized penetration testing engagements
level: critical
fields:
  - CommandLine
  - User
  - Hostname
