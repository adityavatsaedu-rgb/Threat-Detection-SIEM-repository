title: AWS IAM Privilege Escalation via Policy Attachment
id: g2h7i8j9-4k6f-9j7g-3h9i-7k8j0l1m2n3o
status: stable
description: |
  Detects attachment of high-privilege IAM policies to users or roles,
  a primary cloud privilege escalation vector enabling threat actors to
  expand from low-privilege to full administrative access.
references:
  - https://attack.mitre.org/techniques/T1098/001/
author: Aditya Vatsa
date: 2024-07-01
modified: 2024-11-01
tags:
  - attack.privilege_escalation
  - attack.t1098.001
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventName:
      - AttachUserPolicy
      - AttachRolePolicy
      - PutUserPolicy
      - PutRolePolicy
  filter_legitimate:
    userIdentity.type: 'AWSService'
  condition: selection and not filter_legitimate
falsepositives:
  - Authorized IAM changes via infrastructure-as-code pipelines
level: high
fields:
  - eventName
  - userIdentity.arn
  - requestParameters.policyArn
  - sourceIPAddress
