title: Windows Event Log Cleared
id: e0f5g6h7-2i4d-7h5e-1f7g-5i6h8j9k0l1m
status: stable
description: |
  Detects deliberate clearing of Windows event logs, a standard
  anti-forensics technique observed across ransomware families including
  LockBit, BlackCat, and Conti post-exploitation playbooks.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: Aditya Vatsa
date: 2024-05-01
modified: 2024-11-01
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID:
      - 1102
      - 104
  condition: selection
falsepositives:
  - Authorized log rotation by IT operations
level: high
fields:
  - SubjectUserName
  - SubjectDomainName
