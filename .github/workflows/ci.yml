name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install ruff mypy bandit types-requests types-PyYAML --quiet
      - name: Ruff lint
        run: ruff check . --ignore E402,F401,S603 || true
      - name: Ruff format check
        run: ruff format --check . || true
      - name: Bandit security scan
        run: bandit -r detectors/ parsers/ enrichment/ alerting/ -ll -f sarif -o bandit.sarif || true
      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml requests python-dateutil structlog --quiet
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=detectors --cov=parsers \
            --cov-report=xml \
            --junitxml=test-results.xml \
            --ignore=tests/integration || true
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  validate-sigma:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml --quiet
      - name: Validate rule structure
        run: |
          import yaml, sys, pathlib
          errors = []
          for path in pathlib.Path("rules/sigma").rglob("*.yml"):
              try:
                  data = yaml.safe_load(path.read_text())
                  required = ["title","id","status","description","logsource","detection","level"]
                  missing = [f for f in required if f not in data]
                  if missing:
                      errors.append(f"{path}: missing {missing}")
                  else:
                      print(f"  ok  {path}")
              except Exception as e:
                  errors.append(f"{path}: {e}")
          if errors:
              print("\nERRORS:")
              for e in errors: print(f"  {e}")
              sys.exit(1)
          print(f"\nAll rules valid.")
        shell: python

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, validate-sigma]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t siem-threat-detection:${{ github.sha }} .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: siem-threat-detection:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
        continue-on-error: true

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
        continue-on-error: true
