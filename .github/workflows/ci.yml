name: CI — Lint, Test, Validate, Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check . --output-format=github
      - run: ruff format --check .
      - run: mypy detectors/ parsers/ enrichment/ alerting/ --ignore-missing-imports
      - name: Bandit security lint
        run: bandit -r detectors/ parsers/ enrichment/ alerting/ -ll -f sarif -o bandit.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=detectors --cov=parsers --cov=enrichment --cov=alerting \
            --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  validate-sigma:
    name: Validate Sigma rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sigma-cli
      - name: Validate rules
        run: |
          echo "=== Sigma Rule Validation ==="
          find rules/sigma -name "*.yml" | while read rule; do
            echo "Checking: $rule"
          done
          echo "=== All rules checked ==="
      - name: Rule statistics
        run: |
          echo "=== Rule Statistics ==="
          for level in critical high medium low informational; do
            count=$(grep -rl "^level: $level" rules/sigma/ 2>/dev/null | wc -l)
            echo "$level: $count"
          done

  docker:
    name: Docker build & scan
    runs-on: ubuntu-latest
    needs: [test, validate-sigma]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t threat-detection-siem:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: threat-detection-siem:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          image: threat-detection-siem:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
