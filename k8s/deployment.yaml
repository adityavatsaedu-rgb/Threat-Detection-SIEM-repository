apiVersion: apps/v1
kind: Deployment
metadata:
  name: siem-detection-engine
  namespace: security
  labels:
    app: siem-detection-engine
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: siem-detection-engine
  template:
    metadata:
      labels:
        app: siem-detection-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: detection-engine
          image: ghcr.io/adityavatsaedu-rgb/threat-detection-siem:latest
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: siem-secrets
                  key: elasticsearch-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: rules
              mountPath: /app/rules
              readOnly: true
      volumes:
        - name: rules
          configMap:
            name: sigma-rules
