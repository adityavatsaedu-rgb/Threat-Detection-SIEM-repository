version: "3.9"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: siem-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: siem-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./config/logstash:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    restart: unless-stopped

  detection-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-detection-engine
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RULES_DIR=/app/rules/sigma
      - LOG_LEVEL=INFO
    volumes:
      - ./rules:/app/rules:ro
      - ./config:/app/config:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: siem-grafana
    depends_on:
      - elasticsearch
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  esdata:
  grafanadata:
