name: Detection Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Lint & Static Analysis ──────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff (linter)
        run: ruff check . --output-format=github

      - name: Ruff (formatter check)
        run: ruff format --check .

      - name: mypy (type checker)
        run: mypy detectors/ parsers/ enrichment/ alerting/ --ignore-missing-imports

      - name: Bandit (security lint)
        run: bandit -r detectors/ parsers/ enrichment/ alerting/ -ll -f sarif -o bandit.sarif
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

  # ── Unit & Integration Tests ────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=detectors --cov=parsers --cov=enrichment --cov=alerting \
            --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ── Sigma Rule Validation ───────────────────────────────────
  validate-sigma-rules:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sigma-cli
        run: pip install sigma-cli

      - name: Validate all Sigma rules
        run: |
          find rules/sigma -name "*.yml" | while read rule; do
            echo "Validating: $rule"
            sigma check "$rule" || exit 1
          done

      - name: Count rules by severity
        run: |
          echo "=== Rule Statistics ==="
          for level in critical high medium low informational; do
            count=$(grep -rl "^level: $level" rules/sigma/ | wc -l)
            echo "$level: $count rules"
          done

  # ── YARA Rule Validation ────────────────────────────────────
  validate-yara-rules:
    name: Validate YARA Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install YARA
        run: sudo apt-get install -y yara

      - name: Validate YARA rules
        run: |
          find rules/yara -name "*.yar" | while read rule; do
            echo "Validating: $rule"
            yarac "$rule" /tmp/compiled.yar || exit 1
          done

  # ── Docker Build ────────────────────────────────────────────
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [test, validate-sigma-rules]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t threat-detection-siem:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "threat-detection-siem:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── SBOM Generation ─────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: "threat-detection-siem:${{ github.sha }}"
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
